<script>
// persistent storage backed by the browser (localStorage), with graceful fallback
window.storage = {
  async get(k){ try{const v=localStorage.getItem(k); return v===null?null:{key:k,value:v,shared:false};}catch(e){return null;} },
  async set(k,v){ try{localStorage.setItem(k,v);}catch(e){} return {key:k,value:v,shared:false}; },
  async delete(k){ try{localStorage.removeItem(k);}catch(e){} return {key:k,deleted:true,shared:false}; },
  async list(prefix){ const keys=[]; try{for(let i=0;i<localStorage.length;i++){const kk=localStorage.key(i); if(!prefix||kk.startsWith(prefix))keys.push(kk);}}catch(e){} return {keys,prefix,shared:false}; }
};
</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;
let SEED = { people:[], edges:[], photos:{}, log:[] };



// ====================== Storage helpers ======================
const hasStore = typeof window !== "undefined" && window.storage;
const mem = {};
const store = {
  async get(k) {
    if (!hasStore) return mem[k] ?? null;
    try { const r = await window.storage.get(k); return r ? r.value : null; }
    catch { return null; }
  },
  async set(k, v) {
    if (!hasStore) { mem[k] = v; return; }
    try { await window.storage.set(k, v); } catch (e) { console.error(e); }
  },
  async del(k) {
    if (!hasStore) { delete mem[k]; return; }
    try { await window.storage.delete(k); } catch {}
  },
  async list(prefix) {
    if (!hasStore) return Object.keys(mem).filter(x => x.startsWith(prefix));
    try { const r = await window.storage.list(prefix); return r ? r.keys : []; }
    catch { return []; }
  },
};

const TREE_KEY = "ft:tree";
const LOG_KEY = "ft:log";
const FAMILY_KEY = "ft:family";
const SEEDV_KEY = "ft:seedv";
const photoKey = (id) => `ft:photo:${id}`;

// family mode passcode — stored as a SHA-256 hash only.
// to change the code: open the browser console and run  await sha256hex("الرمز الجديد")
// then paste the result here.
const FAMILY_CODE_HASH = "cf0718bf938dd7cbcc42d8d381d15172dc001f5595be34d6ea557004524d149d";
async function sha256hex(s) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(String(s)));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
}
window.sha256hex = sha256hex;

// Arabic-insensitive matching (hamza forms, taa marbuta, alef maqsura, diacritics)
const normAr = (s) => String(s || "")
  .replace(/[أإآ]/g, "ا").replace(/ة/g, "ه").replace(/ى/g, "ي")
  .replace(/[ً-ْٰ]/g, "").trim();

const yearOf = (d) => { const m = String(d || "").match(/\d{4}/); return m ? +m[0] : null; };
function ageOf(p) {
  const by = yearOf(p.dob); if (by == null) return null;
  const ey = p.deceased ? yearOf(p.dod) : new Date().getFullYear();
  return ey != null && ey >= by ? ey - by : null;
}
const mercy = (p) => p.gender === "f" ? "رحمها الله" : "رحمه الله";

const waLink = (v) => { const d = String(v || "").replace(/\D/g, ""); return d ? `https://wa.me/${d}` : null; };
const liLink = (v) => { v = String(v || "").trim(); return !v ? null : (/^https?:/.test(v) ? v : `https://www.linkedin.com/in/${encodeURIComponent(v)}`); };
const twLink = (v) => { v = String(v || "").trim().replace(/^@/, ""); return !v ? null : (/^https?:/.test(v) ? v : `https://x.com/${v}`); };

// ====== Seed data (from transcription) ======


// ====================== Utilities ======================
const uid = () => Math.random().toString(36).slice(2, 10);
const NODE_W = 156;
const NODE_H = 138;

function resizeImage(file, max = 280) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width: w, height: h } = img;
        const scale = Math.min(1, max / Math.max(w, h));
        w = Math.round(w * scale); h = Math.round(h * scale);
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        const ctx = c.getContext("2d");
        ctx.drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL("image/jpeg", 0.72));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function fmtTime(ts) {
  try {
    return new Intl.DateTimeFormat("ar-SA", {
      dateStyle: "medium", timeStyle: "short", calendar: "gregory", numberingSystem: "latn",
    }).format(new Date(ts));
  } catch { return new Date(ts).toLocaleString(); }
}

// ====================== Main Component ======================
function FamilyTree() {
  const [people, setPeople] = useState([]);
  const [edges, setEdges] = useState([]);
  const [photos, setPhotos] = useState({});
  const [log, setLog] = useState([]);

  const [selectedId, setSelectedId] = useState(null);
  const [radialRoot, setRadialRoot] = useState(null);
  const [linkMode, setLinkMode] = useState(false);
  const [linkFrom, setLinkFrom] = useState(null);
  const [tab, setTab] = useState("view"); // view | edit | log
  const [search, setSearch] = useState("");
  const [loading, setLoading] = useState(true);
  const [showPanel, setShowPanel] = useState(false);
  const [familyMode, setFamilyMode] = useState(false);
  const [showUnlock, setShowUnlock] = useState(false);
  const [updateAvail, setUpdateAvail] = useState(false);

  const [view, setView] = useState({ s: 1, tx: 0, ty: 0 });
  const loadedRef = useRef(false);
  const canvasRef = useRef(null);
  const fileRef = useRef(null);
  const importRef = useRef(null);
  const dragRef = useRef(null);
  const panRef = useRef(null);
  const saveTimer = useRef(null);

  // ---------- Inject fonts ----------
  useEffect(() => {
    const id = "ft-fonts";
    if (document.getElementById(id)) return;
    const l = document.createElement("link");
    l.id = id; l.rel = "stylesheet";
    l.href = "https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap";
    document.head.appendChild(l);
  }, []);

  // ---------- Initial load ----------
  useEffect(() => {
    (async () => {
      const raw = await store.get(TREE_KEY);
      let p = [], e = [];
      if (raw) {
        try { const d = JSON.parse(raw); p = d.people || []; e = d.edges || []; } catch {}
      }
      const lg = await store.get(LOG_KEY);
      let logArr = [];
      if (lg) { try { logArr = JSON.parse(lg) || []; } catch {} }

      // family mode: unlocked previously on this device with the current code
      const fm = await store.get(FAMILY_KEY);
      if (fm === FAMILY_CODE_HASH) setFamilyMode(true);

      // First run (no stored data): seed from the transcription
      let seeded = false;
      if (p.length === 0 && e.length === 0) {
        p = SEED.people.map(n => ({ ...n }));
        e = SEED.edges.map(x => ({ ...x }));
        seeded = true;
      }

      setPeople(p); setEdges(e);

      if (seeded) {
        store.set(TREE_KEY, JSON.stringify({ people: p, edges: e }));
        store.set(SEEDV_KEY, String(SEED.version || 1));
        logArr = [{ id: "seed", ts: Date.now(), text: `تعبئة الشجرة من التفريغ (${p.length} فرد)` }];
        store.set(LOG_KEY, JSON.stringify(logArr));
      } else {
        // published data is newer than what this device was seeded with
        const sv = +(await store.get(SEEDV_KEY)) || 1;
        if ((SEED.version || 1) > sv) setUpdateAvail(true);
      }
      setLog(logArr);

      // photos: seeded from embedded data, overlaid by any user uploads in storage
      const ph = { ...SEED.photos };
      const keys = await store.list("ft:photo:");
      for (const k of keys) {
        const v = await store.get(k);
        if (v) ph[k.replace("ft:photo:", "")] = v;
      }
      setPhotos(ph);

      // open zoomed onto the top-left (apex) so names are readable; use search/zoom to navigate
      {
        const r = canvasRef.current?.getBoundingClientRect();
        const vw = r ? r.width : 900, vh = r ? r.height : 600;
        const n0 = p[0] || { x: 0, y: 120 };
        const s0 = vw < 700 ? 1.1 : 0.62;
        setView({ s: s0, tx: vw / 2 - n0.x * s0, ty: Math.max(24, vh * 0.16) - n0.y * s0 });
      }

      setLoading(false);
      loadedRef.current = true;
    })();
  }, []);

  // ---------- Persist tree (debounced) ----------
  useEffect(() => {
    if (!loadedRef.current) return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      store.set(TREE_KEY, JSON.stringify({ people, edges }));
    }, 400);
  }, [people, edges]);

  // ---------- Logging ----------
  const addLog = useCallback((text) => {
    setLog(prev => {
      const next = [{ id: uid(), ts: Date.now(), text }, ...prev].slice(0, 800);
      store.set(LOG_KEY, JSON.stringify(next));
      return next;
    });
  }, []);

  // ====================== Family mode ======================
  const tryUnlock = async (code) => {
    const h = await sha256hex(code);
    if (h !== FAMILY_CODE_HASH) return false;
    setFamilyMode(true); setShowUnlock(false);
    store.set(FAMILY_KEY, h);
    addLog("تفعيل الوضع العائلي");
    return true;
  };
  const lockFamily = () => {
    setFamilyMode(false);
    store.del(FAMILY_KEY);
    setSelectedId(id => { const p = people.find(x => x.id === id); return p?.gender === "f" ? null : id; });
    addLog("قفل الوضع العائلي");
  };

  const applySeedUpdate = () => {
    if (!window.confirm("سيتم استبدال نسختك المحلية بالنسخة الرسمية الجديدة. تعديلاتك المحلية على الأسماء والروابط ستُفقد (صورك المرفوعة تبقى). هل تريد المتابعة؟")) return;
    const p = SEED.people.map(n => ({ ...n }));
    const e = SEED.edges.map(x => ({ ...x }));
    setPeople(p); setEdges(e); setSelectedId(null);
    store.set(TREE_KEY, JSON.stringify({ people: p, edges: e }));
    store.set(SEEDV_KEY, String(SEED.version || 1));
    setUpdateAvail(false);
    addLog(`تحديث الشجرة إلى النسخة الرسمية (v${SEED.version || 1})`);
  };

  // ====================== Actions ======================
  const centerWorld = () => {
    const rect = canvasRef.current?.getBoundingClientRect();
    const w = rect ? rect.width : 800, h = rect ? rect.height : 600;
    return { x: (w / 2 - view.tx) / view.s, y: (h / 2 - view.ty) / view.s };
  };

  const addPerson = (preset = {}) => {
    const c = centerWorld();
    const np = {
      id: uid(),
      name: preset.name || "اسم جديد",
      x: preset.x ?? c.x, y: preset.y ?? c.y,
      note: "", deceased: false,
      ...(preset.gender ? { gender: preset.gender } : {}),
      ...(preset.g != null ? { g: preset.g } : {}),
    };
    setPeople(prev => [...prev, np]);
    setSelectedId(np.id);
    setTab("edit");
    addLog(`إضافة شخص جديد: ${np.name}`);
    return np;
  };

  const updatePerson = (id, patch, logText) => {
    setPeople(prev => prev.map(p => p.id === id ? { ...p, ...patch } : p));
    if (logText) addLog(logText);
  };

  const deletePerson = (id) => {
    const p = people.find(x => x.id === id);
    if (!p) return;
    if (!window.confirm(`حذف "${p.name}" وجميع روابطه؟`)) return;
    setPeople(prev => prev.filter(x => x.id !== id));
    setEdges(prev => prev.filter(e => e.from !== id && e.to !== id));
    setPhotos(prev => { const n = { ...prev }; delete n[id]; return n; });
    store.del(photoKey(id));
    if (selectedId === id) setSelectedId(null);
    addLog(`حذف الشخص: ${p.name}`);
  };

  const addEdge = (from, to, type) => {
    if (from === to) return;
    if (edges.some(e => e.from === from && e.to === to)) return;
    setEdges(prev => [...prev, { id: uid(), from, to, ...(type && type !== "parent" ? { type } : {}) }]);
    const a = people.find(p => p.id === from)?.name || "";
    const b = people.find(p => p.id === to)?.name || "";
    addLog(type === "spouse" ? `إضافة رابط زواج: ${a} ↔ ${b}` : `إضافة رابط: ${a} ← ${b}`);
  };

  const removeEdge = (eid) => {
    const e = edges.find(x => x.id === eid);
    if (!e) return;
    setEdges(prev => prev.filter(x => x.id !== eid));
    const a = people.find(p => p.id === e.from)?.name || "";
    const b = people.find(p => p.id === e.to)?.name || "";
    addLog(`حذف رابط: ${a} ← ${b}`);
  };

  const addChild = (parentId, gender = "m") => {
    const parent = people.find(p => p.id === parentId);
    if (!parent) return;
    const child = addPerson({
      x: parent.x + 30, y: parent.y + 250,
      name: gender === "f" ? "بنت جديدة" : "ابن جديد",
      gender, g: parent.g != null ? parent.g + 1 : undefined,
    });
    setEdges(prev => [...prev, { id: uid(), from: parentId, to: child.id }]);
    addLog(`ربط ${gender === "f" ? "بنت جديدة" : "ابن جديد"} بـ ${parent.name}`);
  };

  const addParent = (childId, gender = "m") => {
    const child = people.find(p => p.id === childId);
    if (!child) return;
    const parent = addPerson({
      x: child.x - 30, y: child.y - 250,
      name: gender === "f" ? "والدة" : "والد",
      gender, g: child.g != null ? child.g - 1 : undefined,
    });
    setEdges(prev => [...prev, { id: uid(), from: parent.id, to: childId }]);
    addLog(`ربط ${gender === "f" ? "والدة" : "والد"} بـ ${child.name}`);
  };

  const addSpouse = (personId) => {
    const p0 = people.find(p => p.id === personId);
    if (!p0) return;
    const gender = p0.gender === "f" ? "m" : "f";
    const sp = addPerson({
      x: p0.x + NODE_W + 40, y: p0.y,
      name: gender === "f" ? "زوجة" : "زوج",
      gender, g: p0.g,
    });
    setEdges(prev => [...prev, { id: uid(), from: personId, to: sp.id, type: "spouse" }]);
    addLog(`ربط ${gender === "f" ? "زوجة" : "زوج"} بـ ${p0.name}`);
  };

  const handlePhoto = async (id, file) => {
    if (!file) return;
    try {
      const data = await resizeImage(file);
      setPhotos(prev => ({ ...prev, [id]: data }));
      await store.set(photoKey(id), data);
      const nm = people.find(p => p.id === id)?.name || "";
      addLog(`رفع صورة لـ ${nm}`);
    } catch { window.alert("تعذر تحميل الصورة"); }
  };

  const removePhoto = (id) => {
    setPhotos(prev => { const n = { ...prev }; delete n[id]; return n; });
    store.del(photoKey(id));
    addLog(`حذف صورة: ${people.find(p => p.id === id)?.name || ""}`);
  };

  const onNodeClick = (id) => {
    if (linkMode) {
      if (!linkFrom) { setLinkFrom(id); }
      else { addEdge(linkFrom, id); setLinkFrom(null); setLinkMode(false); }
      return;
    }
    setSelectedId(id); setTab("view"); setShowPanel(true);
  };

  // ====================== Pointer: drag node / pan ======================
  const onNodePointerDown = (e, id) => {
    // nodes are locked to their generation tier; only the canvas pans
  };
  const ptrs = useRef(new Map());
  const pinchRef = useRef(null);
  const onCanvasPointerDown = (e) => {
    ptrs.current.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (ptrs.current.size === 1) {
      panRef.current = { startX: e.clientX, startY: e.clientY, tx: view.tx, ty: view.ty };
    } else if (ptrs.current.size === 2) {
      panRef.current = null;
      const [a, b] = [...ptrs.current.values()];
      const dist = Math.hypot(a.x - b.x, a.y - b.y);
      const rect = canvasRef.current.getBoundingClientRect();
      const mx = (a.x + b.x) / 2 - rect.left, my = (a.y + b.y) / 2 - rect.top;
      pinchRef.current = { dist, s: view.s, tx: view.tx, ty: view.ty, mx, my,
                           wx: (mx - view.tx) / view.s, wy: (my - view.ty) / view.s };
    }
  };
  const onPointerMove = (e) => {
    if (ptrs.current.has(e.pointerId)) ptrs.current.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (ptrs.current.size >= 2 && pinchRef.current) {
      const [a, b] = [...ptrs.current.values()];
      const dist = Math.hypot(a.x - b.x, a.y - b.y);
      const pr = pinchRef.current;
      const ns = Math.min(3, Math.max(0.12, pr.s * (dist / pr.dist)));
      setView({ s: ns, tx: pr.mx - pr.wx * ns, ty: pr.my - pr.wy * ns });
      return;
    }
    if (panRef.current) {
      const p = panRef.current;
      setView(v => ({ ...v, tx: p.tx + (e.clientX - p.startX), ty: p.ty + (e.clientY - p.startY) }));
    }
  };
  const onPointerUp = (e) => {
    if (e && e.pointerId !== undefined) ptrs.current.delete(e.pointerId);
    if (ptrs.current.size < 2) pinchRef.current = null;
    if (ptrs.current.size === 0) panRef.current = null;
  };

  const onWheel = (e) => {
    e.preventDefault();
    const rect = canvasRef.current.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const wx = (mx - view.tx) / view.s, wy = (my - view.ty) / view.s;
    const ns = Math.min(3, Math.max(0.12, view.s * (e.deltaY < 0 ? 1.1 : 0.9)));
    setView({ s: ns, tx: mx - wx * ns, ty: my - wy * ns });
  };
  const zoom = (f) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const mx = rect.width / 2, my = rect.height / 2;
    const wx = (mx - view.tx) / view.s, wy = (my - view.ty) / view.s;
    const ns = Math.min(3, Math.max(0.12, view.s * f));
    setView({ s: ns, tx: mx - wx * ns, ty: my - wy * ns });
  };

  // ====================== Backup ======================
  const exportData = () => {
    const blob = new Blob([JSON.stringify({ people, edges, photos, log }, null, 2)],
      { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `family-tree-${Date.now()}.json`;
    a.click();
    addLog("تصدير نسخة احتياطية");
  };
  const importData = async (file) => {
    if (!file) return;
    try {
      const txt = await file.text();
      const d = JSON.parse(txt);
      setPeople(d.people || []); setEdges(d.edges || []);
      setPhotos(d.photos || {}); 
      await store.set(TREE_KEY, JSON.stringify({ people: d.people || [], edges: d.edges || [] }));
      for (const [id, data] of Object.entries(d.photos || {})) await store.set(photoKey(id), data);
      addLog("استيراد نسخة احتياطية");
    } catch { window.alert("ملف غير صالح"); }
  };

  // ====================== Render ======================
  const pmap = {}; for (const _p of people) pmap[_p.id] = _p;

  // outside family mode the female layer is hidden entirely
  const visPeople = familyMode ? people : people.filter(p => p.gender !== "f");
  const visIds = new Set(visPeople.map(p => p.id));
  const visEdges = edges.filter(e => visIds.has(e.from) && visIds.has(e.to));

  const selected = visPeople.find(p => p.id === selectedId);
  const q = normAr(search);
  const searchHits = q
    ? visPeople.filter(p => normAr(p.name).includes(q) || normAr(p.nickname).includes(q))
    : [];

  const C = {
    bg: "#f6f4ee", panel: "#ffffff", panel2: "#f1ede4",
    gold: "#2f7d62", goldSoft: "#3f8f73", parch: "#2b2a25",
    sub: "#7b7568", line: "#9fb6ab", border: "#e4dfd4",
  };

  const focusPerson = (p) => {
    const rect = canvasRef.current.getBoundingClientRect();
    setView({ s: 1, tx: rect.width / 2 - p.x, ty: rect.height / 2 - p.y });
    setSelectedId(p.id); setSearch("");
    setTab("view"); setShowPanel(true);
  };

  return (
    <div dir="rtl" style={{
      fontFamily: "'Tajawal', sans-serif", background: C.bg, color: C.parch,
      width: "100%", height: "100vh", display: "flex", flexDirection: "column",
      overflow: "hidden", position: "relative",
    }}>
      {/* Header */}
      <div style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "12px 18px", borderBottom: `1px solid ${C.border}`,
        background: "#ffffff", flexShrink: 0, zIndex: 30,
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{
            width: 36, height: 36, borderRadius: 8, display: "grid", placeItems: "center",
            background: C.gold, color: "#ffffff", fontWeight: 700, fontSize: 20,
            fontFamily: "'Amiri', serif",
          }}>ش</div>
          <div>
            <div style={{ fontFamily: "'Amiri', serif", fontSize: 22, fontWeight: 700, color: C.gold, lineHeight: 1.1 }}>
              شجرة العائلة
            </div>
            <div style={{ fontSize: 11, color: C.sub }}>
              {visPeople.length} فرد · {visEdges.length} رابط
            </div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <Btn C={C} active={familyMode} onClick={() => familyMode ? lockFamily() : setShowUnlock(true)}>
            {familyMode ? "🔓 الوضع العائلي" : "🔒 الوضع العائلي"}
          </Btn>
          <Btn C={C} onClick={() => addPerson()}>+ شخص</Btn>
          <Btn C={C} active={linkMode} onClick={() => { setLinkMode(m => !m); setLinkFrom(null); }}>
            {linkMode ? (linkFrom ? "اختر الثاني…" : "اختر الأول…") : "ربط شخصين"}
          </Btn>
          <Btn C={C} onClick={() => setShowPanel(s => !s)}>{showPanel ? "إخفاء اللوحة" : "إظهار اللوحة"}</Btn>
          <Btn C={C} onClick={exportData}>تصدير</Btn>
          <Btn C={C} onClick={() => importRef.current?.click()}>استيراد</Btn>
          <input ref={importRef} type="file" accept="application/json" style={{ display: "none" }}
            onChange={e => { importData(e.target.files[0]); e.target.value = ""; }} />
        </div>
      </div>

      {updateAvail && (
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "center", gap: 12,
          padding: "8px 14px", background: "#fdf3dd", borderBottom: "1px solid #ecd9ac",
          fontSize: 13, color: "#7a5b16", flexShrink: 0, zIndex: 29,
        }}>
          صدرت نسخة رسمية أحدث من الشجرة.
          <button onClick={applySeedUpdate} style={{
            background: C.gold, color: "#fff", border: "none", padding: "5px 14px",
            borderRadius: 6, cursor: "pointer", fontFamily: "'Tajawal'", fontSize: 13, fontWeight: 600,
          }}>تحديث الآن</button>
          <button onClick={() => setUpdateAvail(false)} style={{
            background: "transparent", color: "#7a5b16", border: "none", cursor: "pointer",
            fontFamily: "'Tajawal'", fontSize: 13, textDecoration: "underline",
          }}>لاحقًا</button>
        </div>
      )}

      <div style={{ flex: 1, display: "flex", overflow: "hidden", position: "relative" }}>
        {/* Canvas */}
        <div
          ref={canvasRef}
          onPointerDown={onCanvasPointerDown}
          onPointerMove={onPointerMove}
          onPointerUp={onPointerUp}
          onPointerLeave={onPointerUp}
          onWheel={onWheel}
          style={{
            flex: 1, position: "relative", overflow: "hidden", cursor: "grab",
            backgroundImage:
              "radial-gradient(circle at 20% 30%, #eaf2ee 0, transparent 55%), radial-gradient(circle at 80% 70%, #f0ece2 0, transparent 55%)",
            backgroundColor: C.bg,
            touchAction: "none",
          }}
        >

          <div style={{
            position: "absolute", top: 0, left: 0,
            transform: `translate(${view.tx}px,${view.ty}px) scale(${view.s})`,
            transformOrigin: "0 0",
          }}>
            {/* generation tier bands + labels */}
            {(() => {
              if (!visPeople.length) return null;
              const byId = pmap;
              const xs = visPeople.map(p => p.x);
              const minX = Math.min(...xs) - 240, maxX = Math.max(...xs) + 240;
              const maxG = visPeople.reduce((m, p) => Math.max(m, p.g || 0), 0);
              const ord = ["الأول","الثاني","الثالث","الرابع","الخامس","السادس","السابع","الثامن","التاسع","العاشر"];
              const bands = [];
              for (let g = 0; g <= maxG; g++) {
                const cy = 140 + g * 250;
                bands.push(
                  <div key={"band" + g} style={{
                    position: "absolute", left: minX, top: cy - NODE_H / 2 - 26,
                    width: maxX - minX, height: NODE_H + 52,
                    background: g % 2 ? "rgba(47,125,98,.055)" : "rgba(47,125,98,.02)",
                    borderTop: "1px solid rgba(47,125,98,.18)",
                    borderBottom: "1px solid rgba(47,125,98,.18)",
                  }}>
                    <div style={{
                      position: "sticky", left: 12, top: 0, display: "inline-block",
                      marginTop: 6, padding: "3px 12px", background: C.gold, color: "#fff",
                      borderRadius: 6, fontFamily: "'Amiri',serif", fontSize: 18, whiteSpace: "nowrap",
                    }}>الجيل {ord[g] || (g + 1)}</div>
                  </div>
                );
              }
              return bands;
            })()}

            {/* orthogonal bus connectors (parent -> shared bus -> children) */}
            <svg style={{ position: "absolute", overflow: "visible", width: 1, height: 1, pointerEvents: "none" }}>
              {(() => {
                const byId = pmap;
                const kids = {};
                visEdges.filter(e => e.type !== "spouse")
                  .forEach(e => { (kids[e.from] = kids[e.from] || []).push(e.to); });
                const out = [];
                // marriage links: double horizontal line between spouses in the same tier
                visEdges.filter(e => e.type === "spouse").forEach(e => {
                  const a = byId[e.from], b = byId[e.to];
                  if (!a || !b) return;
                  const [l, r] = a.x <= b.x ? [a, b] : [b, a];
                  let x1 = l.x + NODE_W / 2, x2 = r.x - NODE_W / 2;
                  if (x2 <= x1) { x1 = l.x; x2 = r.x; }
                  const y = (a.y + b.y) / 2;
                  out.push(<line key={e.id + "s1"} x1={x1} y1={y - 3} x2={x2} y2={y - 3} stroke="#c98aa0" strokeWidth={1.5} />);
                  out.push(<line key={e.id + "s2"} x1={x1} y1={y + 3} x2={x2} y2={y + 3} stroke="#c98aa0" strokeWidth={1.5} />);
                });
                Object.keys(kids).forEach(pid => {
                  const par = byId[pid]; if (!par) return;
                  const cs = kids[pid].map(id => byId[id]).filter(Boolean);
                  if (!cs.length) return;
                  const pBot = par.y + NODE_H / 2;
                  const cTop = cs[0].y - NODE_H / 2;
                  const busY = pBot + (cTop - pBot) * 0.5;
                  const xsC = cs.map(c => c.x);
                  const loX = Math.min(par.x, ...xsC), hiX = Math.max(par.x, ...xsC);
                  out.push(<line key={pid + "p"} x1={par.x} y1={pBot} x2={par.x} y2={busY} stroke={C.line} strokeWidth={1.5} />);
                  if (cs.length > 1)
                    out.push(<line key={pid + "h"} x1={loX} y1={busY} x2={hiX} y2={busY} stroke={C.line} strokeWidth={1.5} />);
                  cs.forEach(c => out.push(
                    <line key={pid + c.id} x1={c.x} y1={busY} x2={c.x} y2={c.y - NODE_H / 2} stroke={C.line} strokeWidth={1.5} />
                  ));
                });
                return out;
              })()}
            </svg>

            {/* nodes */}
            {visPeople.map(p => {
              const isSel = p.id === selectedId;
              const isLinkFrom = linkFrom === p.id;
              const isF = p.gender === "f";
              const accent = isF ? "#b06a84" : C.goldSoft;
              return (
                <div key={p.id}
                  onPointerDown={(e) => onNodePointerDown(e, p.id)}
                  onClick={(e) => { e.stopPropagation(); if (!dragRef.current?.moved) onNodeClick(p.id); }}
                  style={{
                    position: "absolute", left: p.x, top: p.y,
                    width: NODE_W, height: NODE_H, marginLeft: -NODE_W / 2, marginTop: -NODE_H / 2,
                    background: isF ? "linear-gradient(180deg,#ffffff,#f7eef2)" : "linear-gradient(180deg,#ffffff,#f5f2ea)",
                    borderRadius: 12, padding: 10, boxSizing: "border-box",
                    border: `2px solid ${isLinkFrom ? "#e0a23a" : isSel ? C.gold : isF ? "#e0c4cf" : "#ddd7c9"}`,
                    boxShadow: isSel ? `0 0 0 4px rgba(47,125,98,.22), 0 8px 22px rgba(0,0,0,.16)` : "0 3px 10px rgba(0,0,0,.10)",
                    display: "flex", flexDirection: "column", alignItems: "center",
                    cursor: "pointer", userSelect: "none",
                  }}>
                  <div style={{
                    width: 74, height: 74, borderRadius: "50%", overflow: "hidden",
                    border: `2px solid ${accent}`, background: "#e9e4d8",
                    display: "grid", placeItems: "center", flexShrink: 0,
                  }}>
                    {photos[p.id]
                      ? <img src={photos[p.id]} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                      : <span style={{ fontFamily: "'Amiri',serif", fontSize: 26, color: "#8c857a" }}>
                          {p.name?.trim()?.[0] || "؟"}
                        </span>}
                  </div>
                  <div style={{
                    fontFamily: "'Amiri', serif", fontWeight: 700, fontSize: 15, color: "#2c2415",
                    marginTop: 6, textAlign: "center", lineHeight: 1.2, maxWidth: "100%",
                    overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                  }}>{p.name}</div>
                  {p.nickname && (
                    <div style={{ fontSize: 10, color: "#8a7d6a", textAlign: "center", maxWidth: "100%",
                      overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {p.nickname}
                    </div>
                  )}
                  {p.deceased && (
                    <div style={{ fontSize: 11, color: "#7a6a47", fontFamily: "'Amiri',serif" }}>
                      {mercy(p)}
                    </div>
                  )}
                  {p.note && !p.deceased && !p.nickname && (
                    <div style={{ fontSize: 10, color: "#6b5d40", marginTop: 2, textAlign: "center",
                      overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: "100%" }}>
                      {p.note}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* empty state */}
          {!loading && people.length === 0 && (
            <div style={{
              position: "absolute", inset: 0, display: "grid", placeItems: "center", pointerEvents: "none",
            }}>
              <div style={{ textAlign: "center", pointerEvents: "auto" }}>
                <div style={{ fontFamily: "'Amiri',serif", fontSize: 26, color: C.gold, marginBottom: 6 }}>
                  ابدأ ببناء شجرة عائلتك
                </div>
                <div style={{ color: C.sub, fontSize: 14, marginBottom: 16 }}>
                  أضف الجد الأكبر ثم ابنِ الفروع منه
                </div>
                <button onClick={() => addPerson({ name: "الجد الأكبر" })} style={{
                  background: C.gold, color: "#ffffff", border: "none", padding: "10px 22px",
                  borderRadius: 8, fontWeight: 700, fontSize: 15, cursor: "pointer", fontFamily: "'Tajawal'",
                }}>+ أضف أول شخص</button>
              </div>
            </div>
          )}

          {/* zoom controls */}
          <div style={{ position: "absolute", bottom: 16, left: 16, display: "flex", flexDirection: "column", gap: 6 }}>
            <RoundBtn C={C} onClick={() => zoom(1.2)}>+</RoundBtn>
            <RoundBtn C={C} onClick={() => zoom(0.83)}>−</RoundBtn>
            <RoundBtn C={C} onClick={() => {
              const r = canvasRef.current?.getBoundingClientRect();
              const vw = r ? r.width : 900, vh = r ? r.height : 600;
              const n0 = people[0] || { x: 0, y: 120 };
              const s0 = vw < 700 ? 1.1 : 0.62;
              setView({ s: s0, tx: vw / 2 - n0.x * s0, ty: Math.max(24, vh * 0.16) - n0.y * s0 });
            }} title="إعادة الضبط">⟳</RoundBtn>
          </div>

          {/* search */}
          <div style={{ position: "absolute", top: 14, right: 14, width: 230 }}>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="بحث بالاسم…"
              style={{
                width: "100%", boxSizing: "border-box", padding: "9px 12px", borderRadius: 8,
                border: `1px solid ${C.border}`, background: "rgba(255,255,255,.97)", color: C.parch,
                fontFamily: "'Tajawal'", fontSize: 14, outline: "none",
              }} />
            {searchHits.length > 0 && (
              <div style={{
                marginTop: 4, background: C.panel, border: `1px solid ${C.border}`, borderRadius: 8,
                maxHeight: 240, overflowY: "auto",
              }}>
                {searchHits.slice(0, 30).map(p => (
                  <div key={p.id} onClick={() => focusPerson(p)} style={{
                    padding: "8px 12px", cursor: "pointer", fontSize: 14, borderBottom: `1px solid ${C.border}`,
                  }}>{p.name}{p.nickname ? ` (${p.nickname})` : ""}{p.deceased ? ` · ${mercy(p)}` : ""}</div>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* Side panel */}
        {showPanel && (
          <div style={{
            width: 320, flexShrink: 0, background: C.panel, borderRight: `1px solid ${C.border}`,
            display: "flex", flexDirection: "column", zIndex: 20,
          }}>
            <div style={{ display: "flex", borderBottom: `1px solid ${C.border}` }}>
              {[["view", "الملف"], ["edit", "تحرير"], ["log", `السجل (${log.length})`]].map(([k, lbl]) => (
                <button key={k} onClick={() => setTab(k)} style={{
                  flex: 1, padding: "12px 0", background: tab === k ? C.panel2 : "transparent",
                  color: tab === k ? C.gold : C.sub, border: "none", borderBottom: tab === k ? `2px solid ${C.gold}` : "2px solid transparent",
                  cursor: "pointer", fontFamily: "'Tajawal'", fontSize: 14, fontWeight: 600,
                }}>{lbl}</button>
              ))}
            </div>

            <div style={{ flex: 1, overflowY: "auto", padding: 16 }}>
              {tab === "view" && (
                selected ? (
                  <ProfilePanel C={C} person={selected} photo={photos[selected.id]}
                    people={visPeople} pmap={pmap} edges={visEdges} familyMode={familyMode}
                    onEdit={() => setTab("edit")}
                    onUnlock={() => setShowUnlock(true)}
                    onSelect={(id) => setSelectedId(id)}
                    onRadial={() => setRadialRoot(selected.id)}
                  />
                ) : (
                  <PanelHint C={C} />
                )
              )}
              {tab === "edit" && (
                selected ? (
                  <EditPanel C={C} person={selected} photo={photos[selected.id]}
                    people={visPeople} edges={visEdges} familyMode={familyMode}
                    onName={(v) => updatePerson(selected.id, { name: v })}
                    onNameCommit={(v) => addLog(`تعديل الاسم إلى: ${v}`)}
                    onNickname={(v) => updatePerson(selected.id, { nickname: v })}
                    onGender={(v) => updatePerson(selected.id, { gender: v },
                      `تعديل الجنس (${selected.name}): ${v === "f" ? "أنثى" : "ذكر"}`)}
                    onDob={(v) => updatePerson(selected.id, { dob: v })}
                    onDod={(v) => updatePerson(selected.id, { dod: v })}
                    onElderly={(v) => updatePerson(selected.id, { elderly: v })}
                    onContact={(field, v) => updatePerson(selected.id,
                      { contacts: { ...(selected.contacts || {}), [field]: v } })}
                    onPoc={(id) => updatePerson(selected.id, { poc: id },
                      id ? `تعيين جهة تواصل لـ ${selected.name}` : `إزالة جهة التواصل لـ ${selected.name}`)}
                    onNote={(v) => updatePerson(selected.id, { note: v })}
                    onDeceased={(v) => updatePerson(selected.id, { deceased: v },
                      v ? `تعليم متوفى: ${selected.name}` : `إلغاء تعليم المتوفى: ${selected.name}`)}
                    onUpload={() => fileRef.current?.click()}
                    onRemovePhoto={() => removePhoto(selected.id)}
                    onAddChild={(g) => addChild(selected.id, g)}
                    onAddParent={(g) => addParent(selected.id, g)}
                    onAddSpouse={() => addSpouse(selected.id)}
                    onDelete={() => deletePerson(selected.id)}
                    onRemoveEdge={removeEdge}
                    onRadial={() => setRadialRoot(selected.id)}
                    onSelect={(id) => { setSelectedId(id); }}
                    onUnlock={() => setShowUnlock(true)}
                  />
                ) : (
                  <PanelHint C={C} />
                )
              )}
              {tab === "log" && (
                <div>
                  {log.length === 0 && <div style={{ color: C.sub, fontSize: 14 }}>لا توجد تعديلات بعد.</div>}
                  {log.map(l => (
                    <div key={l.id} style={{
                      padding: "10px 0", borderBottom: `1px solid ${C.border}`,
                    }}>
                      <div style={{ fontSize: 14, color: C.parch }}>{l.text}</div>
                      <div style={{ fontSize: 11, color: C.sub, marginTop: 2 }}>{fmtTime(l.ts)}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        )}
      </div>

      {/* hidden photo input */}
      <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }}
        onChange={e => { if (selected) handlePhoto(selected.id, e.target.files[0]); e.target.value = ""; }} />

      {radialRoot && (() => {
        const kids = {};
        visEdges.filter(e => e.type !== "spouse")
          .forEach(e => { (kids[e.from] = kids[e.from] || []).push(e.to); });
        const W = 920, H = 920, ccx = W/2, ccy = H/2, RING = 150;
        const ns = [], ls = [];
        const lay = (id, depth, a0, a1, par) => {
          const ang = (a0 + a1) / 2, r = depth * RING;
          const x = ccx + r * Math.cos(ang), y = ccy + r * Math.sin(ang);
          const pp = pmap[id]; if (!pp) return;
          const pos = { id, x, y, depth, name: pp.name, dead: pp.deceased, f: pp.gender === "f" };
          ns.push(pos); if (par) ls.push({ a: par, b: pos });
          const ks = (kids[id] || []).slice(0, 12);
          if (ks.length && depth < 3) {
            const sp = (a1 - a0) / ks.length;
            ks.forEach((k, i) => lay(k, depth + 1, a0 + i*sp, a0 + (i+1)*sp, pos));
          }
        };
        lay(radialRoot, 0, -Math.PI/2, Math.PI*1.5, null);
        const NR = d => d===0 ? 44 : d===1 ? 32 : 24;
        return (
          <div style={{ position: "absolute", inset: 0, background: C.bg, zIndex: 60, overflow: "auto",
            display: "flex", flexDirection: "column" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between",
              padding: "12px 18px", borderBottom: `1px solid ${C.border}`, flexShrink: 0, background: "#fff" }}>
              <div style={{ fontFamily: "'Amiri',serif", fontSize: 20, color: C.gold, fontWeight: 700 }}>
                عرض دائري — فرع {pmap[radialRoot]?.name}
              </div>
              <Btn C={C} onClick={() => setRadialRoot(null)}>عودة للشجرة</Btn>
            </div>
            <div style={{ flex: 1, overflow: "auto", display: "grid", placeItems: "center", padding: 10 }}>
              <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", maxWidth: 900 }}>
                {[1,2,3].map(r => <circle key={r} cx={ccx} cy={ccy} r={r*RING} fill="none" stroke="#e4dfd4" />)}
                {ls.map((l,i) => <line key={i} x1={l.a.x} y1={l.a.y} x2={l.b.x} y2={l.b.y} stroke={C.line} strokeWidth="1.5" />)}
                {ns.map((n,i) => {
                  const rr = NR(n.depth), ph = photos[n.id];
                  return (
                    <g key={i} style={{ cursor: "pointer" }}
                       onClick={() => { if ((kids[n.id]||[]).length) setRadialRoot(n.id); }}>
                      <circle cx={n.x} cy={n.y} r={rr+2} fill="#fff"
                        stroke={n.depth===0 ? C.gold : "#ddd7c9"} strokeWidth={n.depth===0?3:2} />
                      {ph ? <g><clipPath id={"rc"+i}><circle cx={n.x} cy={n.y} r={rr}/></clipPath>
                        <image href={ph} x={n.x-rr} y={n.y-rr} width={rr*2} height={rr*2}
                          clipPath={`url(#rc${i})`} preserveAspectRatio="xMidYMid slice"/></g>
                        : <circle cx={n.x} cy={n.y} r={rr} fill="#e9e4d8"/>}
                      <text x={n.x} y={n.y+rr+14} textAnchor="middle" fontSize={n.depth===0?15:12}
                        fontFamily="serif" fontWeight="700" fill={C.parch}>{n.name}</text>
                      {n.dead && <text x={n.x} y={n.y+rr+27} textAnchor="middle" fontSize="10" fill={C.sub}>{n.f ? "رحمها الله" : "رحمه الله"}</text>}
                    </g>
                  );
                })}
              </svg>
            </div>
            <div style={{ textAlign: "center", color: C.sub, fontSize: 12, padding: "0 0 10px" }}>
              اضغط أي شخص لجعله المركز · "عودة للشجرة" للرجوع
            </div>
          </div>
        );
      })()}

      {showUnlock && <UnlockModal C={C} onTry={tryUnlock} onClose={() => setShowUnlock(false)} />}

      {loading && (
        <div style={{ position: "absolute", inset: 0, display: "grid", placeItems: "center", background: C.bg, zIndex: 50 }}>
          <div style={{ color: C.gold, fontFamily: "'Amiri',serif", fontSize: 20 }}>جارٍ التحميل…</div>
        </div>
      )}
    </div>
  );
}

// ====================== Sub-components ======================
function Btn({ children, onClick, active, C }) {
  return (
    <button onClick={onClick} style={{
      background: active ? C.gold : "transparent", color: active ? "#ffffff" : C.parch,
      border: `1px solid ${active ? C.gold : C.border}`, padding: "7px 14px", borderRadius: 7,
      cursor: "pointer", fontFamily: "'Tajawal'", fontSize: 13, fontWeight: 600, whiteSpace: "nowrap",
    }}>{children}</button>
  );
}
function RoundBtn({ children, onClick, C, title }) {
  return (
    <button onClick={onClick} title={title} style={{
      width: 38, height: 38, borderRadius: 9, background: "rgba(255,255,255,.96)", color: C.gold,
      border: `1px solid ${C.border}`, cursor: "pointer", fontSize: 18, fontWeight: 700,
    }}>{children}</button>
  );
}

function PanelHint({ C }) {
  return (
    <div style={{ color: C.sub, fontSize: 14, lineHeight: 1.9, textAlign: "center", marginTop: 30 }}>
      اختر شخصًا من الشجرة لعرض ملفه أو تحريره،<br />أو اضغط "+ شخص" لإضافة فرد جديد.
      <div style={{ marginTop: 20, fontSize: 12, color: C.line, textAlign: "right", lineHeight: 2 }}>
        · اسحب الخلفية للتنقل<br />
        · عجلة الفأرة أو إصبعان للتكبير<br />
        · "ربط شخصين" لرسم خط بينهما<br />
        · "🔒 الوضع العائلي" لعرض بيانات التواصل والمواليد
      </div>
    </div>
  );
}

function LockedHint({ C, onUnlock, text }) {
  return (
    <div style={{
      background: C.panel2, border: `1px dashed ${C.border}`, borderRadius: 8,
      padding: "10px 12px", fontSize: 12.5, color: C.sub, marginBottom: 14, lineHeight: 1.8,
    }}>
      🔒 {text}
      <div>
        <span onClick={onUnlock} style={{ color: C.gold, cursor: "pointer", fontWeight: 700, textDecoration: "underline" }}>
          إدخال رمز العائلة
        </span>
      </div>
    </div>
  );
}

function ContactLinks({ C, person }) {
  const c = person.contacts || {};
  const links = [
    ["واتساب", waLink(c.whatsapp), "#25D366"],
    ["لينكدإن", liLink(c.linkedin), "#0A66C2"],
    ["إكس / تويتر", twLink(c.twitter), "#333333"],
  ].filter(([, url]) => url);
  if (!links.length) return <div style={{ fontSize: 13, color: C.sub }}>لا توجد بيانات تواصل مسجلة.</div>;
  return (
    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
      {links.map(([lbl, url, col]) => (
        <a key={lbl} href={url} target="_blank" rel="noopener noreferrer" style={{
          background: col, color: "#fff", padding: "7px 14px", borderRadius: 7,
          fontSize: 13, fontWeight: 600, textDecoration: "none", fontFamily: "'Tajawal'",
        }}>{lbl}</a>
      ))}
    </div>
  );
}

function ProfilePanel({ C, person, photo, people, pmap, edges, familyMode, onEdit, onUnlock, onSelect, onRadial }) {
  const sect = { fontSize: 13, color: C.gold, margin: "16px 0 8px", fontWeight: 700 };

  // paternal lineage chain: فلان بن فلان بن فلان…
  const chain = [];
  let cur = person.id;
  for (let i = 0; i < 12; i++) {
    const ps = edges.filter(e => e.type !== "spouse" && e.to === cur).map(e => pmap[e.from]).filter(Boolean);
    const father = ps.find(p => p.gender !== "f") || ps[0];
    if (!father) break;
    chain.push(father);
    cur = father.id;
  }
  const bin = person.gender === "f" ? "بنت" : "بن";
  const age = ageOf(person);
  const spouses = edges.filter(e => e.type === "spouse" && (e.from === person.id || e.to === person.id))
    .map(e => pmap[e.from === person.id ? e.to : e.from]).filter(Boolean);
  const kids = edges.filter(e => e.type !== "spouse" && e.from === person.id).map(e => pmap[e.to]).filter(Boolean);
  const poc = person.poc ? pmap[person.poc] : null;

  return (
    <div>
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", marginBottom: 6 }}>
        <div style={{
          width: 96, height: 96, borderRadius: "50%", overflow: "hidden",
          border: `3px solid ${person.gender === "f" ? "#b06a84" : C.gold}`,
          background: "#d8c9a8", display: "grid", placeItems: "center", marginBottom: 10,
        }}>
          {photo ? <img src={photo} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
            : <span style={{ fontFamily: "'Amiri',serif", fontSize: 40, color: "#8a754a" }}>{person.name?.[0] || "؟"}</span>}
        </div>
        <div style={{ fontFamily: "'Amiri',serif", fontSize: 22, fontWeight: 700, color: "#2c2415", textAlign: "center" }}>
          {person.name}
        </div>
        {person.nickname && <div style={{ fontSize: 13, color: C.sub }}>{person.nickname}</div>}
        {person.deceased && <div style={{ fontSize: 13, color: "#7a6a47", fontFamily: "'Amiri',serif" }}>{mercy(person)}</div>}
        {person.elderly && !person.deceased && (
          <div style={{ fontSize: 12, color: "#8a6d3b", background: "#f7efdc", padding: "2px 10px", borderRadius: 10, marginTop: 4 }}>
            كبير السن — أطال الله عمره
          </div>
        )}
      </div>

      {chain.length > 0 && (
        <div style={{ fontSize: 13, color: C.sub, textAlign: "center", lineHeight: 1.9, marginBottom: 4 }}>
          {person.name} {bin} {chain.map(a => a.name).join(" بن ")}
        </div>
      )}

      <div style={sect}>الميلاد والعمر</div>
      {familyMode ? (
        <div style={{ fontSize: 14, lineHeight: 1.9 }}>
          {person.dob
            ? <>تاريخ الميلاد: {person.dob}{age != null && !person.deceased ? ` · العمر ${age} سنة تقريبًا` : ""}</>
            : <span style={{ color: C.sub, fontSize: 13 }}>لم يُسجل تاريخ الميلاد.</span>}
          {person.deceased && person.dod && <div>سنة الوفاة: {person.dod}{age != null ? ` · عن عمر ${age} سنة تقريبًا` : ""}</div>}
        </div>
      ) : (
        <LockedHint C={C} onUnlock={onUnlock} text="تواريخ الميلاد تظهر في الوضع العائلي فقط." />
      )}

      <div style={sect}>التواصل</div>
      {familyMode ? (
        person.deceased || person.elderly ? (
          poc ? (
            <div style={{ fontSize: 14, lineHeight: 2 }}>
              جهة التواصل: <span onClick={() => onSelect(poc.id)}
                style={{ color: C.gold, cursor: "pointer", fontWeight: 700, textDecoration: "underline" }}>{poc.name}</span>
              <div style={{ marginTop: 6 }}><ContactLinks C={C} person={poc} /></div>
            </div>
          ) : <div style={{ fontSize: 13, color: C.sub }}>لم تُحدد جهة تواصل بعد.</div>
        ) : <ContactLinks C={C} person={person} />
      ) : (
        <LockedHint C={C} onUnlock={onUnlock} text="بيانات التواصل تظهر في الوضع العائلي فقط." />
      )}

      {(spouses.length > 0 || kids.length > 0) && (
        <div>
          <div style={sect}>الأسرة</div>
          <div style={{ fontSize: 13.5, lineHeight: 2 }}>
            {spouses.map(s => (
              <div key={s.id}>{s.gender === "f" ? "الزوجة" : "الزوج"}: <span onClick={() => onSelect(s.id)}
                style={{ color: C.gold, cursor: "pointer" }}>{s.name}</span></div>
            ))}
            {kids.length > 0 && (
              <div>الأبناء ({kids.length}): {kids.map((k, i) => (
                <span key={k.id}>
                  <span onClick={() => onSelect(k.id)} style={{ color: C.gold, cursor: "pointer" }}>{k.name}</span>
                  {i < kids.length - 1 ? "، " : ""}
                </span>
              ))}</div>
            )}
          </div>
        </div>
      )}

      <div style={{ display: "flex", gap: 8, marginTop: 18 }}>
        <button onClick={onEdit} style={{
          flex: 1, padding: "10px", borderRadius: 7, border: "none",
          background: C.gold, color: "#fff", cursor: "pointer", fontFamily: "'Tajawal'",
          fontSize: 14, fontWeight: 600,
        }}>تحرير البيانات</button>
        <Btn C={C} onClick={onRadial}>عرض دائري</Btn>
      </div>
    </div>
  );
}

function PocPicker({ C, people, value, onChange }) {
  const [q, setQ] = useState("");
  const chosen = value ? people.find(p => p.id === value) : null;
  const nq = normAr(q);
  const hits = nq ? people.filter(p => !p.deceased && (normAr(p.name).includes(nq) || normAr(p.nickname).includes(nq))).slice(0, 8) : [];
  return (
    <div style={{ marginBottom: 14 }}>
      {chosen ? (
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "8px 11px", background: C.panel2, borderRadius: 7, fontSize: 14,
        }}>
          <span>{chosen.name}{chosen.nickname ? ` (${chosen.nickname})` : ""}</span>
          <button onClick={() => onChange(null)} style={{
            background: "transparent", border: "none", color: "#c0392b", cursor: "pointer", fontSize: 12,
          }}>إزالة</button>
        </div>
      ) : (
        <div>
          <input value={q} onChange={e => setQ(e.target.value)} placeholder="ابحث عن اسم جهة التواصل…"
            style={{
              width: "100%", boxSizing: "border-box", padding: "9px 11px", borderRadius: 7,
              border: `1px solid ${C.border}`, background: C.panel2, color: C.parch,
              fontFamily: "'Tajawal'", fontSize: 14, outline: "none",
            }} />
          {hits.length > 0 && (
            <div style={{ border: `1px solid ${C.border}`, borderRadius: 7, marginTop: 4, maxHeight: 180, overflowY: "auto" }}>
              {hits.map(p => (
                <div key={p.id} onClick={() => { onChange(p.id); setQ(""); }}
                  style={{ padding: "7px 11px", fontSize: 13.5, cursor: "pointer", borderBottom: `1px solid ${C.border}` }}>
                  {p.name}{p.nickname ? ` (${p.nickname})` : ""}
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function UnlockModal({ C, onTry, onClose }) {
  const [code, setCode] = useState("");
  const [err, setErr] = useState(false);
  const [busy, setBusy] = useState(false);
  const submit = async () => {
    if (!code || busy) return;
    setBusy(true);
    const ok = await onTry(code);
    setBusy(false);
    if (!ok) { setErr(true); setCode(""); }
  };
  return (
    <div style={{
      position: "absolute", inset: 0, background: "rgba(43,42,37,.45)", zIndex: 80,
      display: "grid", placeItems: "center",
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        background: "#fff", borderRadius: 12, padding: 24, width: 320, maxWidth: "88vw",
        boxShadow: "0 18px 50px rgba(0,0,0,.25)", textAlign: "center",
      }}>
        <div style={{ fontFamily: "'Amiri',serif", fontSize: 20, fontWeight: 700, color: C.gold, marginBottom: 6 }}>
          الوضع العائلي
        </div>
        <div style={{ fontSize: 13, color: C.sub, lineHeight: 1.9, marginBottom: 14 }}>
          أدخل رمز العائلة لعرض بيانات التواصل وتواريخ الميلاد وأفراد العائلة من النساء.
        </div>
        <input type="password" value={code} autoFocus
          onChange={e => { setCode(e.target.value); setErr(false); }}
          onKeyDown={e => { if (e.key === "Enter") submit(); }}
          placeholder="رمز العائلة"
          style={{
            width: "100%", boxSizing: "border-box", padding: "10px 12px", borderRadius: 8,
            border: `1px solid ${err ? "#c0392b" : C.border}`, background: C.panel2,
            fontFamily: "'Tajawal'", fontSize: 15, outline: "none", textAlign: "center", marginBottom: 8,
          }} />
        {err && <div style={{ fontSize: 12.5, color: "#c0392b", marginBottom: 8 }}>رمز غير صحيح، حاول مرة أخرى.</div>}
        <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
          <button onClick={submit} disabled={busy} style={{
            flex: 1, padding: "10px", borderRadius: 8, border: "none", background: C.gold,
            color: "#fff", cursor: "pointer", fontFamily: "'Tajawal'", fontSize: 14, fontWeight: 700,
          }}>{busy ? "جارٍ التحقق…" : "دخول"}</button>
          <button onClick={onClose} style={{
            padding: "10px 16px", borderRadius: 8, border: `1px solid ${C.border}`, background: "transparent",
            color: C.sub, cursor: "pointer", fontFamily: "'Tajawal'", fontSize: 14,
          }}>إلغاء</button>
        </div>
      </div>
    </div>
  );
}

function EditPanel({ C, person, photo, people, edges, familyMode, onRadial, onName, onNameCommit,
  onNickname, onGender, onDob, onDod, onElderly, onContact, onPoc, onNote, onDeceased,
  onUpload, onRemovePhoto, onAddChild, onAddParent, onAddSpouse, onDelete, onRemoveEdge, onSelect, onUnlock }) {
  const label = { fontSize: 12, color: C.sub, marginBottom: 5, display: "block" };
  const inp = {
    width: "100%", boxSizing: "border-box", padding: "9px 11px", borderRadius: 7,
    border: `1px solid ${C.border}`, background: C.panel2, color: C.parch,
    fontFamily: "'Tajawal'", fontSize: 14, outline: "none", marginBottom: 14,
  };
  const sect = { fontSize: 13, color: C.gold, margin: "4px 0 10px", fontWeight: 700 };
  const parents = edges.filter(e => e.type !== "spouse" && e.to === person.id);
  const children = edges.filter(e => e.type !== "spouse" && e.from === person.id);
  const spouses = edges.filter(e => e.type === "spouse" && (e.from === person.id || e.to === person.id));
  const personOf = (id) => people.find(p => p.id === id);
  const nameOf = (id) => personOf(id)?.name || "؟";
  const contacts = person.contacts || {};

  return (
    <div>
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", marginBottom: 16 }}>
        <div style={{
          width: 96, height: 96, borderRadius: "50%", overflow: "hidden",
          border: `3px solid ${person.gender === "f" ? "#b06a84" : C.gold}`,
          background: "#d8c9a8", display: "grid", placeItems: "center", marginBottom: 10,
        }}>
          {photo ? <img src={photo} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} />
            : <span style={{ fontFamily: "'Amiri',serif", fontSize: 40, color: "#8a754a" }}>{person.name?.[0] || "؟"}</span>}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <Btn C={C} onClick={onUpload}>{photo ? "تغيير الصورة" : "رفع صورة"}</Btn>
          {photo && <Btn C={C} onClick={onRemovePhoto}>حذف الصورة</Btn>}
        </div>
      </div>

      <label style={label}>الاسم</label>
      <input value={person.name} onChange={e => onName(e.target.value)}
        onBlur={e => onNameCommit(e.target.value)} style={inp} />

      <label style={label}>الكنية / اللقب (أبو فلان…)</label>
      <input value={person.nickname || ""} onChange={e => onNickname(e.target.value)} style={inp} />

      <label style={label}>الجنس</label>
      <select value={person.gender || "m"} onChange={e => onGender(e.target.value)}
        style={{ ...inp, appearance: "auto" }}>
        <option value="m">ذكر</option>
        <option value="f">أنثى</option>
      </select>

      <label style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10, cursor: "pointer", fontSize: 14 }}>
        <input type="checkbox" checked={!!person.deceased} onChange={e => onDeceased(e.target.checked)}
          style={{ width: 17, height: 17, accentColor: C.gold }} />
        متوفى ({mercy(person)})
      </label>
      <label style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14, cursor: "pointer", fontSize: 14 }}>
        <input type="checkbox" checked={!!person.elderly} onChange={e => onElderly(e.target.checked)}
          style={{ width: 17, height: 17, accentColor: C.gold }} />
        كبير السن (يُتواصل معه عبر جهة تواصل)
      </label>

      {familyMode ? (
        <div>
          <div style={sect}>الميلاد والوفاة</div>
          <label style={label}>تاريخ الميلاد (سنة فقط أو تاريخ كامل: 1965 أو 1965-04-12)</label>
          <input value={person.dob || ""} onChange={e => onDob(e.target.value)} style={inp} dir="ltr" />
          {person.deceased && (
            <div>
              <label style={label}>سنة الوفاة</label>
              <input value={person.dod || ""} onChange={e => onDod(e.target.value)} style={inp} dir="ltr" />
            </div>
          )}

          <div style={sect}>بيانات التواصل</div>
          <label style={label}>واتساب (رقم دولي مثل +9665xxxxxxxx)</label>
          <input value={contacts.whatsapp || ""} onChange={e => onContact("whatsapp", e.target.value)} style={inp} dir="ltr" />
          <label style={label}>لينكدإن (رابط أو اسم مستخدم)</label>
          <input value={contacts.linkedin || ""} onChange={e => onContact("linkedin", e.target.value)} style={inp} dir="ltr" />
          <label style={label}>إكس / تويتر (اسم المستخدم)</label>
          <input value={contacts.twitter || ""} onChange={e => onContact("twitter", e.target.value)} style={inp} dir="ltr" />

          <div style={sect}>جهة التواصل (للمتوفى أو كبير السن)</div>
          <PocPicker C={C} people={people} value={person.poc} onChange={onPoc} />
        </div>
      ) : (
        <LockedHint C={C} onUnlock={onUnlock}
          text="تحرير تواريخ الميلاد وبيانات التواصل متاح في الوضع العائلي فقط." />
      )}

      <label style={label}>ملاحظة (الفرع، معلومات إضافية…)</label>
      <input value={person.note} onChange={e => onNote(e.target.value)} style={inp} />

      <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
        <Btn C={C} onClick={() => onAddParent("m")}>+ والد</Btn>
        <Btn C={C} onClick={() => onAddParent("f")}>+ والدة</Btn>
        <Btn C={C} onClick={() => onAddChild("m")}>+ ابن</Btn>
        <Btn C={C} onClick={() => onAddChild("f")}>+ بنت</Btn>
        <Btn C={C} onClick={onAddSpouse}>+ {person.gender === "f" ? "زوج" : "زوجة"}</Btn>
      </div>
      <button onClick={onRadial} style={{
        width: "100%", padding: "10px", borderRadius: 7, border: "none",
        background: C.gold, color: "#fff", cursor: "pointer", fontFamily: "'Tajawal'",
        fontSize: 14, fontWeight: 600, marginBottom: 16,
      }}>عرض الفرع دائريًا</button>

      {(parents.length > 0 || children.length > 0 || spouses.length > 0) && (
        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 13, color: C.gold, marginBottom: 8, fontWeight: 700 }}>الروابط</div>
          {parents.map(e => (
            <EdgeRow key={e.id} C={C} kind={personOf(e.from)?.gender === "f" ? "والدة" : "والد"} name={nameOf(e.from)}
              onGo={() => onSelect(e.from)} onDel={() => onRemoveEdge(e.id)} />
          ))}
          {spouses.map(e => {
            const other = e.from === person.id ? e.to : e.from;
            return <EdgeRow key={e.id} C={C} kind={personOf(other)?.gender === "f" ? "زوجة" : "زوج"} name={nameOf(other)}
              onGo={() => onSelect(other)} onDel={() => onRemoveEdge(e.id)} />;
          })}
          {children.map(e => (
            <EdgeRow key={e.id} C={C} kind={personOf(e.to)?.gender === "f" ? "ابنة" : "ابن"} name={nameOf(e.to)}
              onGo={() => onSelect(e.to)} onDel={() => onRemoveEdge(e.id)} />
          ))}
        </div>
      )}

      <button onClick={onDelete} style={{
        width: "100%", padding: "10px", borderRadius: 7, border: `1px solid #e3b4ad`,
        background: "transparent", color: "#c0392b", cursor: "pointer", fontFamily: "'Tajawal'",
        fontSize: 14, fontWeight: 600,
      }}>حذف هذا الشخص</button>
    </div>
  );
}

function EdgeRow({ C, kind, name, onGo, onDel }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "7px 10px", background: C.panel2, borderRadius: 7, marginBottom: 6,
    }}>
      <span onClick={onGo} style={{ cursor: "pointer", fontSize: 13 }}>
        <span style={{ color: C.sub }}>{kind}: </span>{name}
      </span>
      <button onClick={onDel} style={{
        background: "transparent", border: "none", color: "#c0392b", cursor: "pointer", fontSize: 12,
      }}>إزالة الرابط</button>
    </div>
  );
}


(async () => {
  try { const r = await fetch('./family-tree-data.json'); SEED = await r.json(); }
  catch (e) { console.error('data load failed', e); }
  const boot = document.getElementById('boot'); if (boot) boot.remove();
  ReactDOM.createRoot(document.getElementById('root')).render(<FamilyTree/>);
})();
</script>
</body>
